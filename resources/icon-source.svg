<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2f5e"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="face" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8eef8"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Clock face -->
  <g filter="url(#shadow)">
    <circle cx="512" cy="472" r="300" fill="url(#face)"/>
    <circle cx="512" cy="472" r="300" fill="none" stroke="#1a2f5e" stroke-width="18" opacity="0.9"/>
  </g>

  <!-- Hour ticks -->
  <g stroke="#1a2f5e" stroke-width="8" stroke-linecap="round" opacity="0.85">
    <line x1="512" y1="200" x2="512" y2="232"/>
    <line x1="512" y1="712" x2="512" y2="744"/>
    <line x1="240" y1="472" x2="272" y2="472"/>
    <line x1="752" y1="472" x2="784" y2="472"/>
  </g>
  <g stroke="#1a2f5e" stroke-width="4" stroke-linecap="round" opacity="0.4">
    <line x1="648" y1="237" x2="636" y2="260"/>
    <line x1="747" y1="336" x2="724" y2="348"/>
    <line x1="747" y1="608" x2="724" y2="596"/>
    <line x1="648" y1="707" x2="636" y2="684"/>
    <line x1="376" y1="707" x2="388" y2="684"/>
    <line x1="277" y1="608" x2="300" y2="596"/>
    <line x1="277" y1="336" x2="300" y2="348"/>
    <line x1="376" y1="237" x2="388" y2="260"/>
  </g>

  <!-- Hour hand (pointing up, slight right) -->
  <line x1="512" y1="472" x2="512" y2="300" stroke="#1a2f5e" stroke-width="22" stroke-linecap="round"/>
  <!-- Minute hand (pointing right) -->
  <line x1="512" y1="472" x2="690" y2="472" stroke="#f59e0b" stroke-width="14" stroke-linecap="round"/>
  <!-- Center pin -->
  <circle cx="512" cy="472" r="20" fill="#1a2f5e"/>
  <circle cx="512" cy="472" r="8" fill="#f59e0b"/>

  <!-- Yen symbol below clock -->
  <g transform="translate(512, 880)">
    <circle cx="0" cy="0" r="78" fill="#f59e0b"/>
    <text x="0" y="28" text-anchor="middle" fill="#1a2f5e" font-size="110" font-weight="900" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif">¥</text>
  </g>
</svg>
