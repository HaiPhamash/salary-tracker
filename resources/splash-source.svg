<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" width="2732" height="2732">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2f5e"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="face" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8eef8"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="30"/>
      <feOffset dx="0" dy="16" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="2732" height="2732" fill="url(#bg)"/>

  <g transform="translate(1366, 1200)">
    <g filter="url(#shadow)">
      <circle cx="0" cy="0" r="340" fill="url(#face)"/>
      <circle cx="0" cy="0" r="340" fill="none" stroke="#1a2f5e" stroke-width="20" opacity="0.9"/>
    </g>
    <g stroke="#1a2f5e" stroke-width="10" stroke-linecap="round" opacity="0.85">
      <line x1="0" y1="-308" x2="0" y2="-272"/>
      <line x1="0" y1="272" x2="0" y2="308"/>
      <line x1="-308" y1="0" x2="-272" y2="0"/>
      <line x1="272" y1="0" x2="308" y2="0"/>
    </g>
    <line x1="0" y1="0" x2="0" y2="-200" stroke="#1a2f5e" stroke-width="26" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="200" y2="0" stroke="#f59e0b" stroke-width="17" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="24" fill="#1a2f5e"/>
    <circle cx="0" cy="0" r="10" fill="#f59e0b"/>
  </g>

  <g transform="translate(1366, 1720)">
    <circle cx="0" cy="0" r="95" fill="#f59e0b"/>
    <text x="0" y="35" text-anchor="middle" fill="#1a2f5e" font-size="135" font-weight="900" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif">¥</text>
  </g>

  <text x="1366" y="1980" text-anchor="middle" fill="#ffffff" font-size="90" font-weight="700" letter-spacing="2" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif">Salary Tracker</text>
</svg>
