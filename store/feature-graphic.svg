<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2f5e"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="face" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8eef8"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Subtle pattern dots -->
  <g opacity="0.06" fill="#fff">
    <circle cx="50" cy="50" r="3"/><circle cx="150" cy="50" r="3"/><circle cx="250" cy="50" r="3"/>
    <circle cx="50" cy="150" r="3"/><circle cx="150" cy="150" r="3"/><circle cx="250" cy="150" r="3"/>
    <circle cx="50" cy="250" r="3"/><circle cx="150" cy="250" r="3"/><circle cx="250" cy="250" r="3"/>
    <circle cx="50" cy="350" r="3"/><circle cx="150" cy="350" r="3"/><circle cx="250" cy="350" r="3"/>
    <circle cx="50" cy="450" r="3"/><circle cx="150" cy="450" r="3"/><circle cx="250" cy="450" r="3"/>
    <circle cx="800" cy="80" r="3"/><circle cx="900" cy="80" r="3"/><circle cx="1000" cy="80" r="3"/>
    <circle cx="800" cy="180" r="3"/><circle cx="900" cy="180" r="3"/><circle cx="1000" cy="180" r="3"/>
    <circle cx="800" cy="280" r="3"/><circle cx="900" cy="280" r="3"/><circle cx="1000" cy="280" r="3"/>
    <circle cx="800" cy="380" r="3"/><circle cx="900" cy="380" r="3"/><circle cx="1000" cy="380" r="3"/>
  </g>

  <!-- Clock icon (left side) -->
  <g transform="translate(240, 250)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="140" fill="url(#face)"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#1a2f5e" stroke-width="10" opacity="0.9"/>
    <!-- Hour ticks -->
    <g stroke="#1a2f5e" stroke-width="5" stroke-linecap="round" opacity="0.85">
      <line x1="0" y1="-120" x2="0" y2="-105"/>
      <line x1="0" y1="120" x2="0" y2="105"/>
      <line x1="-120" y1="0" x2="-105" y2="0"/>
      <line x1="120" y1="0" x2="105" y2="0"/>
    </g>
    <!-- Hour hand -->
    <line x1="0" y1="0" x2="0" y2="-80" stroke="#1a2f5e" stroke-width="12" stroke-linecap="round"/>
    <!-- Minute hand -->
    <line x1="0" y1="0" x2="80" y2="0" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="10" fill="#1a2f5e"/>
    <circle cx="0" cy="0" r="4" fill="#f59e0b"/>
  </g>

  <!-- Yen badge -->
  <g transform="translate(320, 370)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="42" fill="#f59e0b"/>
    <text x="0" y="15" text-anchor="middle" fill="#1a2f5e" font-size="58" font-weight="900" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif">¥</text>
  </g>

  <!-- App title (right side) -->
  <g filter="url(#textShadow)">
    <text x="560" y="200" fill="#ffffff" font-size="56" font-weight="700" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif">Salary</text>
    <text x="560" y="270" fill="#ffffff" font-size="56" font-weight="700" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif">Tracker</text>
    <text x="560" y="320" fill="#f59e0b" font-size="22" font-weight="500" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif">Salary &amp; Income Management</text>
    <!-- Language flags -->
    <text x="560" y="370" fill="#ffffff" font-size="20" opacity="0.7">🇯🇵 🇻🇳 🇺🇸 🇨🇳 🇹🇭 🇧🇷 🇷🇺 🇰🇷 🇮🇳</text>
  </g>
</svg>
